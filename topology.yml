name: windows-10-testing-topology

hosts:
  - name: image-test
    base_box:
      image: windows-11-test
      mgmt_user: windows
#      mng_protocol: winrm
    flavor: standard.medium

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: network
    cidr: 10.0.0.0/24

net_mappings:
    - host: image-test
      network: network
      ip: 10.0.0.10

router_mappings:
    - router: router
      network: network
      ip: 10.0.0.1

groups: []
